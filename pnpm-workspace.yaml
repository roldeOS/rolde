packages:
  - "apps/*"
  - "packages/*"

# Build-script decisions. pnpm 11 requires an explicit call on each dep that ships
# an install script (an undecided one fails install with ERR_PNPM_IGNORED_BUILDS).
#   - sharp powers next/image; unrs-resolver is the native resolver — both build.
#   - core-js (a jsPDF transitive dep) only prints funding info on install → skip it.
allowBuilds:
  sharp: true
  unrs-resolver: true
  core-js: false

# Install native binaries for BOTH the dev machine (current) and the Vercel
# linux-x64 lambdas, so sharp (URDS PDF Kit logo rasteriser) + unrs-resolver ship
# their linux binary in the frozen lockfile — without this, prod 500s with a
# missing-sharp-binary error even though local dev is fine (Roland 2026-06-21).
supportedArchitectures:
  os:
    - current
    - linux
  cpu:
    - current
    - x64

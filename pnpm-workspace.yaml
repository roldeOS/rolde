packages:
  - "apps/*"
  - "packages/*"

# Build-script decisions. pnpm 11 requires an explicit call on each dep that ships
# an install script (an undecided one fails install with ERR_PNPM_IGNORED_BUILDS).
#   - sharp powers next/image; unrs-resolver is the native resolver — both build.
#   - core-js (a jsPDF transitive dep) only prints funding info on install → skip it.
allowBuilds:
  sharp: true
  unrs-resolver: true
  core-js: false
